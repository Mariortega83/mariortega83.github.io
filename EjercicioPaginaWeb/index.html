                <legend>Tipo de coche y caracteristícas</legend>
                <form>

                        <option value="+30.000km">+30.000km</option>
                    </select>

                    <label for="caballos">Caballaje</label>
                    <select id="caballos" name="caballos" size="2" multiple>
                        <option value="70cv">70 CV</option>
