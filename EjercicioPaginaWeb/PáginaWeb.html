<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página principal</title>
    <link rel="icon" type="image/z-icon" href="Fotos/favicom.jpg">
</head>


<body style="background-color:brown;">

    <div style="color: white;">
        <header style="background-color: brown;height: 200px;">
            <h1 style="text-align: center;">TOMOCION</h1>

            <fieldset>
                <legend>Tipo de coche y caracteristícas</legend>
                <form>
                    <label for="Tipo">Tipos de coche</label>
                    <select name="Tipos" id="Tipos">
                        <option value="coúpe">Coúpe</option>
                        <option value="sedán">Sedán</option>
                        <option value="suv">SUV</option>
                        <option value="monovolumen">Monovolumen</option>
                    </select>
                    <label for="Marca">Marca</label>
                    <select name="Marca" id="Marca">
                        <option value="audi">Audi</option>
                        <option value="mercedes">Mercedes</option>
                        <option value="opel">Opel</option>
                        <option value="peugeot">Peugeot</option>
                        <option value="toyota">Toyota</option>
                        <option value="fiat">Fiat</option>
                        <option value="citroën">Opel</option>
                        <option value="mg">MG</option>
                    </select>

                    <label for="kilometraje">Kilometraje</label>
                    <select name="kilometraje" id="kilometraje">
                        <option value="0km">0 km </option>
                        <option value="1.000 - 30.000 km">1.000-30.000 km</option>
                        <option value="+30.000km">+30.000km</option>
                    </select>

                    <label for="caballos">Caballaje</label>
                    <select id="caballos" name="caballos" size="2" multiple>
                        <option value="70cv">70 CV</option>
                        <option value="100cv">100 CV</option>
                        <option value="150cv">150 CV</option>
                        <option value="150cv">+150 CV</option>
                    </select>

        </header>




    </div>

    <div style="background-color: rgb(253, 252, 249);height: 2px;"></div>

    <div>
        <section style="background-color: brown;">
            <h2 style="color: white;">¿Dónde estamos?</h2>
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d794.9010033652936!2d-3.5915283551996535!3d37.162114244497246!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd71fca6107464e5%3A0x5cc395f96e47c0d9!2sIES%20Zaid%C3%ADn%20Vergeles!5e0!3m2!1ses!2ses!4v1700209234100!5m2!1ses!2ses"
                width="450" height="450"></iframe>
            <img src="Fotos/audi-rs6.jpg" alt="Audi rs6" width="350" height="200">
        </section>
    </div>
    <div style="background-color: brown;height: 10px;"></div>
    <div style="background-color: rgb(253, 252, 249);height: 2px;"></div>


</body>

</html>
