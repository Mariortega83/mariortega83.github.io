<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas</title>
    <link rel="stylesheet" href="css_reservas.css">
    <link rel="icon" href="Fotos/logo1.png" type="image/x-icon">
</head>

<body>
    <header id="inicio">
        <div id="logo">
            <img src="Fotos/logo1.png" alt="">
            <h1>Atlantic Hotel</h1>
        </div>
        <div>
            <p>
                Síguenos en nuestras redes sociales
            </p>
            <a href="https://www.instagram.com/"><img src="Fotos/instagram-removebg-preview.png" alt=""></a>
            <a href="https://twitter.com/?lang=es"><img src="Fotos/gorjeo-removebg-preview.png" alt=""></a>
            <a href="https://www.facebook.com/?locale=es_ES"><img src="Fotos/facebook-removebg-preview.png" alt=""></a>

        </div>

    </header>



<form action="" method="POST">
    <label for="name">Nombre: </label>
    <input type="text" id="name" name="name" required>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required>

    <label for="check-in">Hora de Llegada:</label>
    <input type="date" id="check-in" name="check-in" required>

    <label for="check-out">Fecha de Salida: </label>
    <input type="date" id="check-out" name="check-out" required>

    <label for="room-type">Tipo de habitación: </label>
    <select id="room-type" name="room-type" required>
        <option value="Normal">Single</option>
        <option value="Lujo">Double</option>
        <option value="Presidencial">Suite</option>
    </select>

    <input type="submit" value="Enviar">
</form>
        




</body>

</html>
